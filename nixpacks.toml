# Deploy Python FastAPI backend
[variables]
PIP_NO_CACHE_DIR = "true"

[[phases]]
name = "setup"
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r backend/requirements.txt"
]

[[phases]]
name = "build"
cmds = [
  "if [ -d frontend ]; then rm -rf backend/frontend && cp -r frontend backend/frontend; fi",
  "if [ -d ../frontend ] && [ ! -d frontend ]; then rm -rf frontend && cp -r ../frontend frontend; fi",
  "test -d backend/frontend || test -d frontend || (echo 'ERROR: no frontend directory found' && exit 1)"
]

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
