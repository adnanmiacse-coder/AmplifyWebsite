# Deploy Python FastAPI backend (repo root)
[variables]
PIP_NO_CACHE_DIR = "true"

# Let Nixpacks install phase handle pip/venv — do not run pip in setup.

[phases.build]
cmds = [
  "if [ -d frontend ]; then rm -rf backend/frontend && cp -r frontend backend/frontend; fi",
  "test -d backend/frontend || (echo 'ERROR: no frontend directory found' && exit 1)"
]

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
