# Deploy Python FastAPI backend
[variables]
PIP_NO_CACHE_DIR = "true"

[[phases]]
name = "setup"
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r backend/requirements.txt"
]

[[phases]]
name = "build"
cmds = []

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
