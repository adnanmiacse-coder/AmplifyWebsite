# Used when Railway service root directory is set to backend/
[variables]
PIP_NO_CACHE_DIR = "true"

# Let Nixpacks install phase create /opt/venv and pip install requirements.txt.
# Do NOT run pip in setup — nix python has no pip module yet.

[phases.build]
cmds = [
  "if [ -d ../frontend ]; then rm -rf frontend && cp -r ../frontend frontend; fi",
  "test -d frontend || (echo 'ERROR: frontend directory missing after build' && exit 1)",
  "ls -la frontend | head -20"
]

[start]
cmd = "python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
